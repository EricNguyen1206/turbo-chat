name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  # ============================================================
  # 1. Test Frontend
  # ============================================================
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @raven/types build
          pnpm --filter @raven/validators build
          pnpm --filter @raven/shared build

      - name: Lint
        run: pnpm --filter @raven/web lint
        continue-on-error: true

      - name: Type check
        run: pnpm --filter @raven/web exec tsc --noEmit

      - name: Test
        run: pnpm --filter @raven/web test
        continue-on-error: true

      - name: Build
        run: pnpm --filter @raven/web build

  # ============================================================
  # 2. Test Backend
  # ============================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @raven/types build
          pnpm --filter @raven/validators build
          pnpm --filter @raven/shared build

      - name: Lint
        run: pnpm --filter @raven/api lint
        continue-on-error: true

      - name: Type check
        run: pnpm --filter @raven/api exec tsc --noEmit

      - name: Test
        run: pnpm --filter @raven/api test
        continue-on-error: true

      - name: Build
        run: pnpm --filter @raven/api build

  # ============================================================
  # 3. Deploy Backend — chỉ khi push lên main + tests pass
  # ============================================================
  deploy-backend:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      id-token: write

    env:
      IMAGE: asia-southeast1-docker.pkg.dev/nanobot-487408/erion-repo/api

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY_BASE64 }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.CLOUD_RUN_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}

      - name: Print deployment info
        run: |
          echo "✅ Deployed successfully"
          echo "Image: ${{ env.IMAGE }}:${{ github.sha }}"
          echo "Service: ${{ secrets.CLOUD_RUN_SERVICE }}"
