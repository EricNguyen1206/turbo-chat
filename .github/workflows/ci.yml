name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @raven/types build
          pnpm --filter @raven/validators build
          pnpm --filter @raven/shared build

      - name: Test frontend
        run: pnpm --dir apps/web exec vitest run

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @raven/types build
          pnpm --filter @raven/validators build
          pnpm --filter @raven/shared build

      - name: Generate Prisma client
        run: pnpm --dir apps/api exec prisma generate

      - name: Test backend
        run: pnpm --filter @raven/api test
